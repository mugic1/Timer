<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Snowfall Timer | PWA</title>
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden; font-family: 'Orbitron', monospace; display: flex; align-items: center; justify-content: center; position: relative; }
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&display=swap');
    #snowCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    .timer-container { position: relative; z-index: 2; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .digital-timer { font-size: clamp(3rem, 14vw, 11rem); font-weight: 800; letter-spacing: 0.08em; background: linear-gradient(125deg, #fff, #b3e4ff); background-clip: text; -webkit-background-clip: text; color: transparent; text-shadow: 0 0 12px rgba(0,160,255,0.6); font-variant-numeric: tabular-nums; text-align: center; }
    .timer-pulse { animation: softGlow 0.18s ease-out; }
    @keyframes softGlow { 0% { text-shadow: 0 0 4px cyan, 0 0 8px #0af; opacity: 0.9; } 100% { text-shadow: 0 0 12px #0af, 0 0 18px #08f; opacity: 1; } }
    .start-btn-central { font-family: 'Orbitron', monospace; font-weight: 700; font-size: 1.8rem; letter-spacing: 4px; padding: 1.2rem 2.8rem; border-radius: 4rem; background: linear-gradient(115deg, #0a2a3b, #02101a); border: 1.5px solid rgba(0,200,255,0.9); color: #f0fcff; text-shadow: 0 0 10px cyan; box-shadow: 0 0 25px rgba(0,180,255,0.5); cursor: pointer; transition: all 0.25s; backdrop-filter: blur(4px); margin-top: 2rem; }
    .start-btn-central:hover { transform: scale(1.03); background: #0f4058; box-shadow: 0 0 35px #0af; }
    .corner-btn { position: fixed; font-family: 'Orbitron', monospace; font-weight: 600; font-size: 1rem; letter-spacing: 1px; padding: 0.7rem 1.4rem; border-radius: 3rem; background: rgba(10,25,35,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.35); color: #eef5ff; cursor: pointer; transition: all 0.2s; z-index: 20; box-shadow: 0 6px 14px rgba(0,0,0,0.4); min-width: 100px; text-transform: uppercase; }
    .corner-btn:hover { background: rgba(30,55,70,0.95); border-color: #0af; transform: translateY(-2px); }
    .pause-corner { top: 30px; right: 30px; }
    .reset-corner { bottom: 40px; right: 30px; }
    .hidden { display: none; }
    .timer-wrapper { text-align: center; background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); border-radius: 3rem; padding: 1rem 2.2rem; }
    @media (max-width: 800px), (orientation: portrait) { .start-btn-central { font-size: 1.4rem; padding: 0.9rem 2rem; } .digital-timer { font-size: clamp(2.6rem, 12vw, 8rem); } .corner-btn { padding: 0.5rem 1.2rem; font-size: 0.85rem; min-width: 85px; } .pause-corner { top: 20px; right: 20px; } .reset-corner { bottom: 25px; right: 20px; } }
  </style>
</head>
<body>
<canvas id="snowCanvas"></canvas>
<div class="timer-container">
  <div class="timer-wrapper"><div class="digital-timer" id="timerDisplay">00:00:00</div></div>
  <button id="centralStartBtn" class="start-btn-central">✨ START ✨</button>
</div>
<button id="pauseBtn" class="corner-btn pause-corner hidden">PAUSE</button>
<button id="resetBtn" class="corner-btn reset-corner hidden">RESET</button>
<script>
  let elapsedSeconds = 0, timerInterval = null, timerState = 'stopped';
  const timerDisplay = document.getElementById('timerDisplay');
  const centralStart = document.getElementById('centralStartBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const resetBtn = document.getElementById('resetBtn');
  function formatTime(sec) { let h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60; return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
  function updateDisplay() { let t=formatTime(elapsedSeconds); if(timerDisplay.innerText!==t) { timerDisplay.innerText=t; timerDisplay.classList.add('timer-pulse'); setTimeout(()=>timerDisplay.classList.remove('timer-pulse'),150); } }
  function tick() { if(timerState==='running') { elapsedSeconds++; updateDisplay(); } }
  function startInt() { if(timerInterval) clearInterval(timerInterval); timerInterval=setInterval(tick,1000); }
  function stopInt() { if(timerInterval) { clearInterval(timerInterval); timerInterval=null; } }
  const canvas=document.getElementById('snowCanvas'); let ctx=canvas.getContext('2d'), snowActive=false, animFrame=null, snowflakes=[];
  class Snowflake { constructor(w,h) { this.x=Math.random()*w; this.y=Math.random()*h; this.r=Math.random()*4.5+1.5; this.speed=0.65+Math.random()*1.1; this.wobble=(Math.random()-0.5)*0.4; this.opacity=Math.random()*0.65+0.35; this.phase=Math.random()*Math.PI*2; } update(w,h) { this.y+=this.speed; this.phase+=0.02; this.x+=Math.sin(this.phase)*0.2+this.wobble*0.2; if(this.y>h+this.r) { this.y=-this.r*2; this.x=Math.random()*w; } if(this.x<-this.r) this.x=w+this.r; if(this.x>w+this.r) this.x=-this.r; } draw(ctx) { ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fillStyle=`rgba(255,250,240,${this.opacity})`; ctx.fill(); ctx.shadowBlur=5; ctx.shadowColor="rgba(180,220,255,0.6)"; ctx.fill(); ctx.shadowBlur=0; } }
  function initSnow() { let w=canvas.width,h=canvas.height; let a=[]; for(let i=0;i<140;i++) a.push(new Snowflake(w,h)); snowflakes=a; }
  function resizeCanvas() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; if(ctx) ctx.clearRect(0,0,canvas.width,canvas.height); if(snowActive&&snowflakes.length) for(let f of snowflakes) { f.x=Math.min(canvas.width,Math.max(0,f.x)); f.y=Math.min(canvas.height,Math.max(0,f.y)); } else if(snowActive) initSnow(); }
  function animateSnow() { if(!snowActive) return; ctx.clearRect(0,0,canvas.width,canvas.height); for(let f of snowflakes) { f.update(canvas.width,canvas.height); f.draw(ctx); } if(snowActive) animFrame=requestAnimationFrame(animateSnow); }
  function startSnow() { if(snowActive) return; snowActive=true; resizeCanvas(); initSnow(); if(animFrame) cancelAnimationFrame(animFrame); animateSnow(); }
  function stopSnow() { if(!snowActive) return; snowActive=false; if(animFrame) cancelAnimationFrame(animFrame); animFrame=null; if(ctx) ctx.clearRect(0,0,canvas.width,canvas.height); snowflakes=[]; }
  function resetToInitial() { stopInt(); timerState='stopped'; elapsedSeconds=0; updateDisplay(); if(snowActive) stopSnow(); pauseBtn.classList.add('hidden'); resetBtn.classList.add('hidden'); centralStart.classList.remove('hidden'); }
  function startTimerAndSnow() { if(timerState==='stopped') { stopInt(); startInt(); timerState='running'; if(!snowActive) startSnow(); centralStart.classList.add('hidden'); pauseBtn.classList.remove('hidden'); resetBtn.classList.add('hidden'); } else if(timerState==='paused') { startInt(); timerState='running'; if(!snowActive) startSnow(); } }
  function pauseAction() { if(timerState==='running') { stopInt(); timerState='paused'; resetBtn.classList.remove('hidden'); } else if(timerState==='paused') { startInt(); timerState='running'; if(!snowActive) startSnow(); } }
  function resetAction() { stopInt(); timerState='stopped'; elapsedSeconds=0; updateDisplay(); if(snowActive) stopSnow(); pauseBtn.classList.add('hidden'); resetBtn.classList.add('hidden'); centralStart.classList.remove('hidden'); }
  centralStart.addEventListener('click', startTimerAndSnow);
  pauseBtn.addEventListener('click', pauseAction);
  resetBtn.addEventListener('click', resetAction);
  window.addEventListener('resize',()=>{ resizeCanvas(); if(snowActive) initSnow(); });
  window.addEventListener('orientationchange',()=>setTimeout(()=>resizeCanvas(),30));
  resizeCanvas(); stopSnow(); timerState='stopped'; elapsedSeconds=0; updateDisplay(); centralStart.classList.remove('hidden'); pauseBtn.classList.add('hidden'); resetBtn.classList.add('hidden'); if(timerInterval) clearInterval(timerInterval);
  window.addEventListener('keydown',(e)=>{ if(e.code==='Space') { e.preventDefault(); if(timerState==='running') pauseAction(); else if(timerState==='paused') pauseAction(); else if(timerState==='stopped' && !centralStart.classList.contains('hidden')) startTimerAndSnow(); } else if(e.code==='KeyR') { e.preventDefault(); resetAction(); } });
</script>
</body>
</html>
